<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="768" viewBox="0 0 2048 768">
  <defs>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#6D28D9"/>
      <stop offset="0.5" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <style>
      .brand{font-family:Inter,system-ui,Segoe UI,Roboto,Arial,sans-serif;font-weight:800;font-size:160px;fill:url(#g1);letter-spacing:-6px}
      .tag{font-family:Inter,system-ui,Arial,sans-serif;font-weight:500;font-size:36px;fill:#F8FAFC;opacity:0.95}
    </style>
  </defs>

  <!-- símbolo (icono) -->
  <g id="icon" transform="translate(160,96)">
    <circle cx="128" cy="128" r="120" fill="none" stroke="url(#g1)" stroke-width="20"/>
    <g transform="translate(88,88)" fill="#F8FAFC">
      <rect x="0" y="40" width="18" height="56" rx="4"/>
      <rect x="30" y="24" width="18" height="72" rx="4"/>
      <rect x="60" y="8" width="18" height="88" rx="4"/>
      <rect x="90" y="24" width="18" height="72" rx="4"/>
      <rect x="120" y="40" width="18" height="56" rx="4"/>
    </g>
  </g>

  <!-- logotipo -->
  <g transform="translate(420,220)">
    <text x="0" y="160" class="brand">Thevibe</text>
    <use href="#icon" transform="translate(420,-96) scale(0.7)"/>
    <text x="620" y="160" class="brand">Sound records</text>
  </g>

  <!-- tagline -->
  <g transform="translate(420,420)">
    <text x="0" y="48" class="tag">Música y vibración en cada nota</text>
  </g>
</svg>
